version: '3'

vars:
  IMAGE: omnivoicetts:test
  TINY_IMAGE: omnivoicetts:tiny
  PORT: '7861'
  GPU_DEVICE: '0'
  APP_DEVICE: 'auto'
  HF_TOKEN: ''
  HF_CACHE_VOLUME: omnivoicetts_hf_cache
  OPENAI_PROFILE_VOLUME: omnivoicetts_openai_voice_profiles
  HF_HUB_OFFLINE: '1'
  TRANSFORMERS_OFFLINE: '1'
  LOAD_ASR: '0'
  ALLOW_CPU_EAGER_ASR: '0'
  CONTAINER: omnivoicetts
  CONTAINER_LOCAL: omnivoicetts_local
  TEMP_AUDIO: '%TEMP%\\omnivoicetts_task_audio'
  API_TEXT: 'Hello world. This is OmniVoiceTTS.'
  API_LANGUAGE: 'English'
  API_VOICE: 'af_heart'
  API_FORMAT: 'mp3'
  BENCHMARK_BASE_URL: 'http://127.0.0.1:7864'
  BENCHMARK_RESULTS: 'benchmarks\\example-generation.json'
  BENCHMARK_MARKDOWN_DIR: 'benchmarks'
  BENCHMARK_VOICE: 'benchmark_original_clone'
  BENCHMARK_REF_AUDIO: '/app/omnivoice/assets/openai_default_voice.mp3'
  BENCHMARK_NUM_STEP: '24'
  BENCHMARK_FORMAT: 'mp3'
  BENCHMARK_LIMIT_LANGUAGES: '0'
  BENCHMARK_ITEMS: '100'
  BENCHMARK_SAMPLES_PER_LANGUAGE: '2'
  BENCHMARK_RANDOM_WARMUP: '10'
  BENCHMARK_REFERENCE_WARMUP: '10'
  BENCHMARK_CPU_MEMORY_LIMITS: '1536m,2048m,2560m,3072m,4096m,5120m,6144m,7168m,8192m,10240m,12288m'
  BENCHMARK_CPU_MEMORY_RESULTS: 'benchmarks\cpu-memory.json'
  BENCHMARK_CPU_MEMORY_MARKDOWN: 'benchmarks\CPU_MEMORY.md'
  BENCHMARK_CPU_MEMORY_START_PORT: '7870'
  CODEQL: 'C:\sandbox\tools\codeql\codeql.exe'
  CODEQL_WORK_DIR: 'C:\sandbox\tools\codeql-work\OmniVoiceTTS'
  CODEQL_PYTHON_DB: '{{.CODEQL_WORK_DIR}}\codeql-db'
  CODEQL_PYTHON_SARIF: '{{.CODEQL_WORK_DIR}}\codeql-results.sarif'
  CODEQL_ACTIONS_DB: '{{.CODEQL_WORK_DIR}}\actions-db'
  CODEQL_ACTIONS_SARIF: '{{.CODEQL_WORK_DIR}}\actions-results.sarif'
  DRY_RUN: '0'
  NEXT_VERSION: ''
  SKIP_VALIDATION: '0'
  NAS_HOST: '192.168.10.148'
  NAS_SSH_PORT: '1022'
  NAS_USER: 'admin'

tasks:
  gpuinfo:
    desc: Show host GPU indexes
    cmds:
      - cmd /c nvidia-smi --query-gpu=index,name --format=csv,noheader

  nas-shell:
    desc: Open SSH shell to the Synology NAS
    cmds:
      - ssh -p {{.NAS_SSH_PORT}} {{.NAS_USER}}@{{.NAS_HOST}}

  image:
    desc: Build local baked OmniVoiceTTS Docker image
    cmds:
      - cmd /c docker build --target baked -t {{.IMAGE}} .

  image-tiny:
    desc: Build local tiny OmniVoiceTTS Docker image without baked model cache
    cmds:
      - cmd /c docker build --target tiny -t {{.TINY_IMAGE}} .

  cache-init:
    desc: Seed the persistent Hugging Face cache volume from the baked image
    cmds:
      - cmd /c docker volume create {{.HF_CACHE_VOLUME}} >nul
      - cmd /c docker run --rm -v {{.HF_CACHE_VOLUME}}:/cache {{.IMAGE}} sh -c "mkdir -p /cache && cp -an /app/.cache/huggingface/. /cache/ || true"

  init-clean:
    desc: Remove known local OmniVoiceTTS deployment containers without touching volumes or images
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} {{.CONTAINER_LOCAL}} omnivoicetts_openai_test omnivoicetts_memory_test omnivoicetts_cpu_bug omnivoicetts_cpu_warn >nul 2>&1 || exit /b 0

  init:
    desc: Clean local OmniVoiceTTS deployments and start one hot-reload instance from the existing image
    cmds:
      - task: init-clean
      - task: cache-init
      - cmd /c docker volume create {{.OPENAI_PROFILE_VOLUME}} >nul
      - cmd /c docker run -d --name {{.CONTAINER_LOCAL}} -p {{.PORT}}:7861 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e OMNIVOICE_DEVICE={{.APP_DEVICE}} -e OMNIVOICE_LOAD_ASR={{.LOAD_ASR}} -e OMNIVOICE_ALLOW_CPU_EAGER_ASR={{.ALLOW_CPU_EAGER_ASR}} -e PORT=7861 -e UVICORN_RELOAD=1 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE={{.HF_HUB_OFFLINE}} -e TRANSFORMERS_OFFLINE={{.TRANSFORMERS_OFFLINE}} -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface -v {{.OPENAI_PROFILE_VOLUME}}:/app/openai_voice_profiles -v "{{.TASKFILE_DIR}}\omnivoice:/app/omnivoice" -v "{{.TASKFILE_DIR}}\hangrylabs:/app/hangrylabs" {{.IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER_LOCAL}}"

  release:
    desc: Release current VERSION snapshot, tag it, and prepare next snapshot
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release.ps1 -DryRun "{{.DRY_RUN}}" -NextVersion "{{.NEXT_VERSION}}" -SkipValidation "{{.SKIP_VALIDATION}}"

  deps:
    desc: Regenerate Linux/Python 3.13 requirements.txt from requirements.in
    cmds:
      - uv pip compile requirements.in --python-version 3.13 --python-platform x86_64-manylinux_2_36 --index-strategy unsafe-best-match --upgrade --no-header --no-annotate --output-file requirements.txt

  codeql-version:
    desc: Show local CodeQL CLI version
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{{.CODEQL}}' version"

  codeql-python:
    desc: Run local CodeQL Python scan and write SARIF outside the repo
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.CODEQL_WORK_DIR}}' | Out-Null"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path '{{.CODEQL_PYTHON_DB}}') { Remove-Item -Recurse -Force '{{.CODEQL_PYTHON_DB}}' }"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{{.CODEQL}}' database create '{{.CODEQL_PYTHON_DB}}' --language=python --source-root '{{.TASKFILE_DIR}}'"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{{.CODEQL}}' database analyze '{{.CODEQL_PYTHON_DB}}' codeql/python-queries --format=sarif-latest --output='{{.CODEQL_PYTHON_SARIF}}'"

  codeql-actions:
    desc: Run local CodeQL GitHub Actions workflow scan and write SARIF outside the repo
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.CODEQL_WORK_DIR}}' | Out-Null"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path '{{.CODEQL_ACTIONS_DB}}') { Remove-Item -Recurse -Force '{{.CODEQL_ACTIONS_DB}}' }"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{{.CODEQL}}' database create '{{.CODEQL_ACTIONS_DB}}' --language=actions --source-root '{{.TASKFILE_DIR}}'"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{{.CODEQL}}' database analyze '{{.CODEQL_ACTIONS_DB}}' codeql/actions-queries --format=sarif-latest --output='{{.CODEQL_ACTIONS_SARIF}}'"

  codeql:
    desc: Run local CodeQL Python and GitHub Actions scans
    cmds:
      - task: codeql-python
      - task: codeql-actions

  imagerun:
    desc: Run baked image with UI and API on PORT
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - task: cache-init
      - cmd /c docker volume create {{.OPENAI_PROFILE_VOLUME}} >nul
      - cmd /c docker run -d --name {{.CONTAINER}} -p {{.PORT}}:7861 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e OMNIVOICE_DEVICE={{.APP_DEVICE}} -e OMNIVOICE_LOAD_ASR={{.LOAD_ASR}} -e OMNIVOICE_ALLOW_CPU_EAGER_ASR={{.ALLOW_CPU_EAGER_ASR}} -e PORT=7861 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE={{.HF_HUB_OFFLINE}} -e TRANSFORMERS_OFFLINE={{.TRANSFORMERS_OFFLINE}} -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface -v {{.OPENAI_PROFILE_VOLUME}}:/app/openai_voice_profiles {{.IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER}}"

  imagerun-tiny:
    desc: Run tiny image online on first use, using the persistent Hugging Face cache volume
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - cmd /c docker volume create {{.HF_CACHE_VOLUME}} >nul
      - cmd /c docker volume create {{.OPENAI_PROFILE_VOLUME}} >nul
      - cmd /c docker run -d --name {{.CONTAINER}} -p {{.PORT}}:7861 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e OMNIVOICE_DEVICE={{.APP_DEVICE}} -e OMNIVOICE_LOAD_ASR={{.LOAD_ASR}} -e OMNIVOICE_ALLOW_CPU_EAGER_ASR={{.ALLOW_CPU_EAGER_ASR}} -e PORT=7861 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE=0 -e TRANSFORMERS_OFFLINE=0 -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface -v {{.OPENAI_PROFILE_VOLUME}}:/app/openai_voice_profiles {{.TINY_IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER}}"

  localrun:
    desc: Run baked image with local omnivoice/ bind-mounted for hot-swapping
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - task: cache-init
      - cmd /c docker volume create {{.OPENAI_PROFILE_VOLUME}} >nul
      - cmd /c docker run -d --name {{.CONTAINER_LOCAL}} -p {{.PORT}}:7861 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e OMNIVOICE_DEVICE={{.APP_DEVICE}} -e OMNIVOICE_LOAD_ASR={{.LOAD_ASR}} -e OMNIVOICE_ALLOW_CPU_EAGER_ASR={{.ALLOW_CPU_EAGER_ASR}} -e PORT=7861 -e UVICORN_RELOAD=1 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE={{.HF_HUB_OFFLINE}} -e TRANSFORMERS_OFFLINE={{.TRANSFORMERS_OFFLINE}} -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface -v {{.OPENAI_PROFILE_VOLUME}}:/app/openai_voice_profiles -v "{{.TASKFILE_DIR}}\omnivoice:/app/omnivoice" -v "{{.TASKFILE_DIR}}\hangrylabs:/app/hangrylabs" {{.IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER_LOCAL}}"

  localrun-tiny:
    desc: Run tiny image with local omnivoice/ bind-mounted, online on first use
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - cmd /c docker volume create {{.HF_CACHE_VOLUME}} >nul
      - cmd /c docker volume create {{.OPENAI_PROFILE_VOLUME}} >nul
      - cmd /c docker run -d --name {{.CONTAINER_LOCAL}} -p {{.PORT}}:7861 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e OMNIVOICE_DEVICE={{.APP_DEVICE}} -e OMNIVOICE_LOAD_ASR={{.LOAD_ASR}} -e OMNIVOICE_ALLOW_CPU_EAGER_ASR={{.ALLOW_CPU_EAGER_ASR}} -e PORT=7861 -e UVICORN_RELOAD=1 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE=0 -e TRANSFORMERS_OFFLINE=0 -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface -v {{.OPENAI_PROFILE_VOLUME}}:/app/openai_voice_profiles -v "{{.TASKFILE_DIR}}\omnivoice:/app/omnivoice" -v "{{.TASKFILE_DIR}}\hangrylabs:/app/hangrylabs" {{.TINY_IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER_LOCAL}}"

  imageweb:
    desc: Open default browser to local OmniVoiceTTS UI
    cmds:
      - cmd /c start "" "http://localhost:{{.PORT}}"

  localps:
    desc: Show likely local dev app processes
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/local-processes.ps1 -Mode scan -RepoPath "{{.TASKFILE_DIR}}"

  localports:
    desc: Show likely local dev app processes plus listening ports
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/local-processes.ps1 -Mode scan -RepoPath "{{.TASKFILE_DIR}}" -IncludePorts

  localclean:
    desc: Stop Python/Node/dev processes whose command line references this repo
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/local-processes.ps1 -Mode clean -RepoPath "{{.TASKFILE_DIR}}"

  appinject:
    desc: Inject local omnivoice/app.py into the running baked container and restart it
    cmds:
      - cmd /c docker cp "{{.TASKFILE_DIR}}\omnivoice\app.py" {{.CONTAINER}}:/app/omnivoice/app.py
      - cmd /c docker restart {{.CONTAINER}}
      - cmd /c docker ps --filter "name={{.CONTAINER}}"

  imageapi:
    desc: Call API, play generated temp audio, then remove it
    cmds:
      - 'cmd /c curl.exe -sS --retry 60 --retry-delay 2 --retry-connrefused http://localhost:{{.PORT}}/tts/ping >nul'
      - 'cmd /c curl.exe -sS -X POST http://localhost:{{.PORT}}/tts/generate -H "Content-Type: application/json" -d "{\"text\":\"{{.API_TEXT}}\",\"voice\":\"{{.API_VOICE}}\",\"language\":\"{{.API_LANGUAGE}}\",\"speed\":1.0,\"device\":\"{{.APP_DEVICE}}\",\"output_format\":\"{{.API_FORMAT}}\"}" --output {{.TEMP_AUDIO}}.{{.API_FORMAT}}'
      - 'cmd /c if not exist {{.TEMP_AUDIO}}.{{.API_FORMAT}} exit /b 1'
      - 'cmd /c python -c "from pathlib import Path; p=Path(r''{{.TEMP_AUDIO}}.{{.API_FORMAT}}''); assert p.exists() and p.stat().st_size > 0, p"'
      - 'powershell -NoProfile -ExecutionPolicy Bypass -File scripts/play-audio.ps1 -Path "{{.TEMP_AUDIO}}.{{.API_FORMAT}}"'
      - 'cmd /c del /f /q {{.TEMP_AUDIO}}.{{.API_FORMAT}}'

  imageapi-format:
    desc: Call API for API_FORMAT and verify the output file is non-empty
    cmds:
      - 'cmd /c curl.exe -sS --retry 60 --retry-delay 2 --retry-connrefused http://localhost:{{.PORT}}/tts/ping >nul'
      - 'cmd /c curl.exe -sS -X POST http://localhost:{{.PORT}}/tts/generate -H "Content-Type: application/json" -d "{\"text\":\"{{.API_TEXT}}\",\"voice\":\"{{.API_VOICE}}\",\"language\":\"{{.API_LANGUAGE}}\",\"speed\":1.0,\"device\":\"{{.APP_DEVICE}}\",\"output_format\":\"{{.API_FORMAT}}\"}" --output {{.TEMP_AUDIO}}.{{.API_FORMAT}}'
      - 'cmd /c if not exist {{.TEMP_AUDIO}}.{{.API_FORMAT}} exit /b 1'
      - 'cmd /c python -c "from pathlib import Path; p=Path(r''{{.TEMP_AUDIO}}.{{.API_FORMAT}}''); assert p.exists() and p.stat().st_size > 0, p"'
      - 'cmd /c del /f /q {{.TEMP_AUDIO}}.{{.API_FORMAT}}'

  benchmark-examples:
    desc: Benchmark the example-generation workload and append results
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command ".\.venv\Scripts\python.exe scripts\benchmark-example-generation.py --base-url '{{.BENCHMARK_BASE_URL}}' --manifest examples\assets\manifest.json --results '{{.BENCHMARK_RESULTS}}' --markdown-dir '{{.BENCHMARK_MARKDOWN_DIR}}' --voice '{{.BENCHMARK_VOICE}}' --reference-audio '{{.BENCHMARK_REF_AUDIO}}' --num-step '{{.BENCHMARK_NUM_STEP}}' --format '{{.BENCHMARK_FORMAT}}' --limit-languages '{{.BENCHMARK_LIMIT_LANGUAGES}}' --items-per-round '{{.BENCHMARK_ITEMS}}' --samples-per-language '{{.BENCHMARK_SAMPLES_PER_LANGUAGE}}' --random-warmup '{{.BENCHMARK_RANDOM_WARMUP}}' --reference-warmup '{{.BENCHMARK_REFERENCE_WARMUP}}'"

  benchmark-cpu-memory:
    desc: Benchmark CPU Docker memory limits for common OpenAI speech scenarios
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command ".\.venv\Scripts\python.exe scripts\benchmark-cpu-memory.py --image '{{.IMAGE}}' --limits '{{.BENCHMARK_CPU_MEMORY_LIMITS}}' --start-port '{{.BENCHMARK_CPU_MEMORY_START_PORT}}' --results '{{.BENCHMARK_CPU_MEMORY_RESULTS}}' --markdown '{{.BENCHMARK_CPU_MEMORY_MARKDOWN}}'"

  imagestop:
    desc: Stop running OmniVoiceTTS containers
    cmds:
      - cmd: cmd /c docker stop {{.CONTAINER}} >nul 2>&1
        ignore_error: true
      - cmd: cmd /c docker stop {{.CONTAINER_LOCAL}} >nul 2>&1
        ignore_error: true

  logs:
    desc: Show logs from active OmniVoiceTTS container
    cmds:
      - cmd /c docker logs --tail 200 {{.CONTAINER_LOCAL}} 2>nul || docker logs --tail 200 {{.CONTAINER}}

  nuke:
    desc: Remove OmniVoiceTTS local containers, images, and Hugging Face cache volume
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - cmd /c docker rmi -f {{.IMAGE}} >nul 2>&1
      - cmd /c docker rmi -f {{.TINY_IMAGE}} >nul 2>&1
      - cmd /c docker volume rm -f {{.HF_CACHE_VOLUME}} >nul 2>&1
