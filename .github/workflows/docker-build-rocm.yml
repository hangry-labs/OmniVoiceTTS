name: Build and Push Docker Image (ROCM Experimental)

on:
  push:
    tags:
      - "v*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional Docker tag to publish, for example v0.2.1"
        required: false
        type: string
      checkout_ref:
        description: "Optional git ref to build. Defaults to image_tag when image_tag is set."
        required: false
        type: string
      push_latest:
        description: "Also publish latest_rocm"
        required: false
        default: true
        type: boolean
      rocm_base:
        description: "ROCm PyTorch base image"
        required: false
        default: "rocm/pytorch:rocm7.1_ubuntu24.04_py3.13_pytorch_release_2.9.1"
        type: string

env:
  IMAGE_NAME: hangrylabs/omnivoicetts

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.inputs.image_tag || github.ref }}

      - name: Free up disk space
        run: |
          echo "Initial disk usage:"
          df -h

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache || true
          docker system prune -af || true

          echo "Disk usage after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Extract version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF##refs/tags/}" >> $GITHUB_ENV
          elif [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "VERSION=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          fi

      - name: Build experimental ROCm Docker image
        run: |
          docker build \
            -f Dockerfile.rocm \
            --target baked \
            --build-arg ROCM_BASE="${{ github.event.inputs.rocm_base || 'rocm/pytorch:rocm7.1_ubuntu24.04_py3.13_pytorch_release_2.9.1' }}" \
            -t $IMAGE_NAME:latest_rocm \
            .
          if [[ -n "$VERSION" ]]; then
            docker tag $IMAGE_NAME:latest_rocm $IMAGE_NAME:${VERSION}_rocm
          fi

      - name: Push experimental ROCm Docker image
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.push_latest }}" == "true" ]]; then
            docker push $IMAGE_NAME:latest_rocm
          fi
          if [[ -n "$VERSION" ]]; then
            docker push $IMAGE_NAME:${VERSION}_rocm
          fi
